<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<link rel="icon" id="dynamic-favicon" type="image/png" href="/../img/favicons/favicon-64x64.png" sizes="64x64">
<style>
:root {
    --bg: #0b0f1a;
    --text: #e6edf3;
    --text2: #9aa4b2;
    --accent: #3ba4f7;
    --border: #1f2937;
    --radius: 12px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAV */
.nav {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    text-align: center;
}

.nav h1 {
    font-size: 1rem;
    font-weight: 700;
}

.nav span {
    color: var(--accent);
}

/* CENTER CONTENT */
.hero-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
}

.hero-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    max-width: 600px;
}

.hero-content h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
}

.hero-content h1 span {
    color: var(--accent);
}

.hero-content p {
    color: var(--text2);
    font-size: 1.1rem;
    line-height: 1.6;
}

.hero-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
}

.btn {
    padding: 12px 22px;
    border-radius: var(--radius);
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #fff;
    transition: opacity 0.2s;
}

.btn:hover {
    opacity: 0.85;
}
</style>
</head>
<body>

    <!-- Navbar -->
    <nav id="navbar"></nav>


<section class="hero-wrap">
    <div class="hero-content">
        <h1>Oops! <span>Page Not Found</span></h1>
        <p>
            The page you’re looking for doesn’t exist or has been moved. Please go back to the homepage and continue exploring.
        </p>
        <div class="hero-buttons">
            <button class="btn" onclick="location.href='/'">Go Home</button>
            <button class="btn" onclick="location.reload()">Reload</button>
        </div>
    </div>
</section>


    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Scripts -->
    <script src="js/svg.js"></script>
    <script src="js/components.js"></script>
    <script src="js/global.js"></script>
    <script src="js/cdn.js"></script>
    <script src="js/index.js"></script>
    <script src="js/maintenance.js"></script>
</body>

</html>
