<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<link rel="icon" id="dynamic-favicon" type="image/png" href="/../img/favicons/favicon-64x64.png" sizes="64x64">
    <link rel="stylesheet" href="css/global.css" />
<style>
:root {
    --bg: #0b0f1a;
    --text: #e6edf3;
    --text2: #9aa4b2;
    --accent: #3ba4f7;
    --border: #1f2937;
    --radius: 12px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Navbar */
nav {
    display: flex;
    gap: 3vw;
    height: 60px;
    padding: 0 3vw;

    position: sticky;
    top: 0;
    z-index: 500;
    align-items: center;

    background: var(--bg);
    border-bottom: 1px solid var(--border);
}

.nav-logo {
    margin: auto 0;

    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 1px;
}

.nav-logo span {
    font-weight: 900;
    color: var(--accent);
}

.nav-links {
    display: flex;
    flex: 1;
    gap: 12px;
}

.nav-links a {
    display: block;
    padding: 6px 12px;
    margin: auto 0;

    border-radius: var(--radius);

    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text2);
}

.nav-links a:hover {
    background: var(--bg2);
    color: var(--text);
}

.nav-links a.active {
    background: var(--accent-dim);
    color: var(--accent);
}

.theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;

    min-width: 50px;
    height: 26px;
    position: relative;

    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);

    cursor: pointer;
}

.theme-toggle::after {
    content: "";
    width: 20px;
    height: 20px;

    position: absolute;
    top: 2px;
    left: 2px;

    background: var(--text3);
    border-radius: 100%;
}

[data-theme="dark"] .theme-toggle:after {
    background: var(--accent);
    transform: translateX(24px);
}

@media (max-width: 580px) {
    .nav-logo {
        display: none;
    }
}

@media (max-width: 450px) {
    .nav-links {
        justify-content: center;
        gap: 8px;
    }

    .theme-toggle,
    .theme-toggle::after {
        display: none;
    }
}

/* CENTER CONTENT */
.hero-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
}

.hero-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    max-width: 600px;
}

.hero-content h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
}

.hero-content h1 span {
    color: var(--accent);
}

.hero-content p {
    color: var(--text2);
    font-size: 1.1rem;
    line-height: 1.6;
}

.hero-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
}

.btn {
    padding: 12px 22px;
    border-radius: var(--radius);
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #fff;
    transition: opacity 0.2s;
}

.btn:hover {
    opacity: 0.85;
}

footer {
    padding: 16px;

    border-top: 1px solid var(--border);

    font-size: 0.8rem;
    color: var(--text3);
    text-align: center;
}
</style>
</head>
<body>

    <!-- Navbar -->
    <nav id="navbar"></nav>


<section class="hero-wrap">
    <div class="hero-content">
        <h1>Oops! <span>Page Not Found</span></h1>
        <p>
            The page you’re looking for doesn’t exist or has been moved. Please go back to the homepage and continue exploring.
        </p>
        <div class="hero-buttons">
            <button class="btn" onclick="location.href='/'">Go Home</button>
            <button class="btn" onclick="location.reload()">Reload</button>
        </div>
    </div>
</section>


    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Scripts -->
    <script src="js/svg.js"></script>
    <script src="js/components.js"></script>
    <script src="js/global.js"></script>
    <script src="js/cdn.js"></script>
    <script src="js/index.js"></script>
    <script src="js/maintenance.js"></script>
</body>

</html>
