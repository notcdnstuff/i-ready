<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />

    <title>i-Ready | Player</title>
    <meta name="description" content="A large, curated game library of Flash games, web ports, emulators, and more. No BS or installs
    needed." />



    <link rel="icon" id="dynamic-favicon" type="image/png" href="img/favicons/favicon-64x64.png" sizes="64x64">

    <link rel="manifest" href="site.webmanifest">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicons/apple-touch-icon.png">

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/player.css" />
</head>

<body>
    <!-- Navbar -->
    <nav id="navbar"></nav>

    <!-- Main -->

    <!-- Player -->
    <div class="player-wrap">
        <iframe id="player" allowfullscreen></iframe>
    </div>

    <!-- Toolbar -->
    <div class="section-wrap toolbar-wrap">
        <div class="toolbar-info">
            <h1 id="game-name">Loading...</h1>
            <a href="#game-info" id="info-btn">Game Info</a>
        </div>
        <div class="toolbar-actions" id="toolbar-buttons">

        </div>
    </div>

    <div class="divider"></div>

    <!-- Game Info -->
    <div class="section-wrap game-info">
        <div id="game-description">
            <h2>Description</h2>
        </div>
        <div class="game-details" id="game-details"></div>
    </div>

    <!-- Games -->
    <div class="section-wrap">
        <h3>Also check out...</h3>
        <div class="games-grid" id="random-games-grid"></div>
    </div>

    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Scripts -->
    <script src="js/svg.js"></script>
    <script src="js/components.js"></script>
    <script src="js/global.js"></script>
    <script src="js/cdn.js"></script>
    <script src="js/player.js"></script>
</body>

</html>
